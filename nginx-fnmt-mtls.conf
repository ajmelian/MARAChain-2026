# ═════════════════════════════════════════════════════════════════
#  MARAChain Nginx Configuration — FNMT mTLS
# ═════════════════════════════════════════════════════════════════
#
# Location: /etc/nginx/sites-available/marachain
#
# This config enables client certificate authentication using
# FNMT digital certificates (Spanish eIDAS qualified certificates).
#
# The FNMT root CA and intermediate certificates must be
# concatenated in a single PEM file:
#   /etc/nginx/certs/fnmt-ca-chain.pem
#
# Download from:
#   https://www.sede.fnmt.gob.es/descargas/certificados-raiz
#   - AC RAIZ FNMT-RCM (root)
#   - AC FNMT Usuarios (intermediate for personal certificates)
#   - AC Componentes Informaticos (intermediate for organization certs)
#
# @since 1.4.0

server {
    listen 443 ssl http2;
    server_name marachain.com www.marachain.com;

    # ── Server TLS ────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/marachain.pem;
    ssl_certificate_key /etc/nginx/certs/marachain.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Client mTLS — FNMT certificate ───────────────────────────
    # 'optional' → allows both certificate and non-certificate access
    # 'on'       → mandatory certificate (use for /auth/fnmt location)
    ssl_client_certificate /etc/nginx/certs/fnmt-ca-chain.pem;
    ssl_verify_client optional;
    ssl_verify_depth 4;

    # ── Pass certificate data to PHP ─────────────────────────────
    # These headers are used by FnmtIdentityProvider via $_SERVER
    fastcgi_param SSL_CLIENT_VERIFY  $ssl_client_verify;
    fastcgi_param SSL_CLIENT_S_DN    $ssl_client_s_dn;
    fastcgi_param SSL_CLIENT_I_DN    $ssl_client_i_dn;
    fastcgi_param SSL_CLIENT_CERT    $ssl_client_cert;
    fastcgi_param SSL_CLIENT_V_START $ssl_client_v_start;
    fastcgi_param SSL_CLIENT_V_END   $ssl_client_v_end;
    fastcgi_param SSL_CLIENT_SERIAL  $ssl_client_serial;

    # ── Document root ─────────────────────────────────────────────
    root /var/www/prod/current/public;
    index index.php;

    # ── Security headers ─────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── CI4 rewrite ──────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── FNMT auth location — mandatory mTLS ──────────────────────
    location /auth/fnmt {
        # Override to require client certificate for this path
        if ($ssl_client_verify != "SUCCESS") {
            return 403 "Se requiere certificado FNMT valido.";
        }

        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ──────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.5-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # ── Block sensitive files ────────────────────────────────────
    location ~ /\. {
        deny all;
    }
    location ~ \.env$ {
        deny all;
    }
}
